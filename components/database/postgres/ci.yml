  postgres-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Apply migrations from zero
        run: echo "Replace with the project's migration command against localhost:5432."
      - name: Integration tests
        run: echo "Replace with the project's database integration test command."
