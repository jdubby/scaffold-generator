  fastapi-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint and format
        run: ruff check . && ruff format --check .
      - name: Type-check
        run: mypy .
      - name: Unit tests
        run: pytest
