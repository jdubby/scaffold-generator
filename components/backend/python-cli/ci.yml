  python-cli-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and tooling
        run: pip install -e ".[dev]"
      - name: Lint and format
        run: ruff check . && ruff format --check .
      - name: Type-check
        run: mypy src tests
      - name: Unit tests
        run: pytest
